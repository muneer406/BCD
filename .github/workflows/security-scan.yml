name: Security Scan

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  frontend-audit:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit.json || true
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload npm audit report
        if: failure() || steps.npm-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit.json

      - name: Comment PR with npm audit results
        if: github.event_name == 'pull_request' && steps.npm-audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('frontend/npm-audit.json', 'utf8');
            } catch {}
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ Frontend npm audit findings\n\n\`\`\`json\n${report.slice(0, 6000)}\n\`\`\`
            });

  backend-audit:
    name: Backend pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install pip-audit
        run: uv pip install --system pip-audit

      - name: Run pip-audit
        id: pip-audit
        run: |
          pip-audit --no-deps -r requirements.txt --format=json --output=pip-audit.json || true
          pip-audit --no-deps -r requirements.txt
        continue-on-error: true

      - name: Upload pip-audit report
        if: failure() || steps.pip-audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit.json

      - name: Comment PR with pip-audit results
        if: github.event_name == 'pull_request' && steps.pip-audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('backend/pip-audit.json', 'utf8');
            } catch {}
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ Backend pip-audit findings\n\n\`\`\`json\n${report.slice(0, 6000)}\n\`\`\`
            });

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
          - name: backend
            dockerfile: backend/Dockerfile
            context: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: bcd/${{ matrix.name }}:scan

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bcd/${{ matrix.name }}:scan
          format: json
          output: trivy-${{ matrix.name }}.json
          severity: CRITICAL,HIGH
          exit-code: "1"
        continue-on-error: true

      - name: Upload Trivy report
        if: failure() || steps.trivy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.name }}-report
          path: trivy-${{ matrix.name }}.json

      - name: Comment PR with Trivy results
        if: github.event_name == 'pull_request' && steps.trivy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('trivy-${{ matrix.name }}.json', 'utf8');
            } catch {}
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ⚠️ Container scan findings: ${{ matrix.name }}\n\n\`\`\`json\n${report.slice(0, 6000)}\n\`\`\`
            });
