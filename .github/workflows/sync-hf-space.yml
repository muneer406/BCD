name: Reusable backend → HF Space sync

on:
  workflow_call:
    inputs:
      verify_deployment:
        description: "Whether to poll the HF Space /health endpoint after sync"
        required: false
        default: true
        type: boolean
    outputs:
      space_url:
        description: "URL of the Hugging Face Space"
        value: ${{ jobs.sync.outputs.space_url }}
      deployed:
        description: "Whether the sync actually pushed changes"
        value: ${{ jobs.sync.outputs.deployed }}

jobs:
  sync:
    name: Push backend/ to Hugging Face Space
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ steps.meta.outputs.space_url }}
      deployed: ${{ steps.push.outputs.deployed }}

    steps:
      # ── 1. Checkout the full repo ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure git identity + HF credentials ────────────────────────
      - name: Configure git & credentials
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # Store credentials so git never prompts / embeds token in URLs
          git config --global credential.helper store
          echo "https://muneer320:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          echo "Credentials stored."

      # ── 3. Export metadata for downstream jobs ─────────────────────────────
      - name: Export Space metadata
        id: meta
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          echo "space_url=https://${HF_SPACE_ID}.hf.space" >> "$GITHUB_OUTPUT"
          echo "HF_SPACE_ID=${HF_SPACE_ID}" >> "$GITHUB_ENV"

      # ── 4. Clone the HF Space repo ─────────────────────────────────────────
      - name: Clone HF Space
        run: |
          echo "HF_SPACE_ID: ${HF_SPACE_ID}"
          # Use plain HTTPS URL — credentials come from ~/.git-credentials
          git clone "https://huggingface.co/spaces/${HF_SPACE_ID}" hf-space
          echo "Clone succeeded."

      # ── 5. Sync backend/ → root of the HF Space ───────────────────────────
      - name: Sync files
        run: |
          rsync -av --delete --exclude='.git' backend/ hf-space/
          echo "Rsync complete."

      # ── 6. Create HF Spaces README with frontmatter ─────────────────────────
      #     This must run AFTER rsync so --delete doesn't remove it.
      - name: Create HF README
        run: |
          printf '%s\n' '---' 'title: BCD Backend' 'emoji: 🩺' 'colorFrom: indigo' 'colorTo: blue' 'sdk: docker' 'sdk_version: "1.0"' 'python_version: "3.11"' 'app_file: app/main.py' 'pinned: false' '---' '' > hf-space/README.md
          cat backend/README.md >> hf-space/README.md
          echo "HF README created."

      # ── 7. Commit & push unconditionally (with marker to guarantee a change) ──
      - name: Push to HF Space
        id: push
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cd hf-space
          # Touch a marker so we always have a change to commit
          echo "${SHORT_SHA} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .hf-sync-marker
          git add -A
          git commit --allow-empty -m "sync: GitHub ${SHORT_SHA}"
          git push "https://huggingface.co/spaces/${HF_SPACE_ID}" main
          echo "Push succeeded."
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      # ── 8. Optionally wait for Space to be healthy ─────────────────────────
      - name: Verify HF Space deployment
        if: ${{ inputs.verify_deployment && steps.push.outputs.deployed == 'true' }}
        env:
          SPACE_URL: ${{ steps.meta.outputs.space_url }}
        run: |
          echo "Polling ${SPACE_URL}/health ..."
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${SPACE_URL}/health" || true)
            echo "Attempt ${i}: HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "HF Space is healthy."
              exit 0
            fi
            sleep 20
          done
          echo "HF Space did not become healthy in time."
          exit 1
