name: Deploy to HF Space

on:
  push:
    branches: [never-used-branch]
    paths:
      - "backend/**"
  workflow_dispatch:

concurrency: hf-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install huggingface_hub
        run: pip install -q huggingface_hub

      - name: Upload files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 backend/scripts/upload_hf.py

      - name: Verify
        run: |
          sleep 15
          curl -s -o /dev/null -w "%{http_code}" https://muneer320-bcd-backend.hf.space/
